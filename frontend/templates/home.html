<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Forum Mathématiques</title>
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" href="/static/home.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/home" style="color: white; text-decoration: none; font-size: 1.5rem; font-weight: bold;">MathForum</a>
            <nav>
                <a href="/fil/create">Nouveau Sujet</a>
                <a href="/logout">Déconnexion</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="threads-list">
            {{range .}}
            <div class="thread-card">
                <div class="tags">
                    {{range .Tags}}
                    <span class="tag-badge" data-type="{{.}}">{{.}}</span>
                    {{end}}
                </div>
                <h3><a href="/fil/{{.ID}}">{{.Titre}}</a></h3>
            </div>
            {{else}}
            <p style="text-align: center; color: #7f8c8d; margin-top: 3rem;">Aucune publication pour le moment.</p>
            {{end}}
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
